<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XAN0</title>
  <link rel="icon" href="logo.png" type="image/png">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <main>
    <section id="intro" class="center hero reveal">
      <h1 class="wordmark">XAN0</h1>
    </section>
    <section id="work" class="projects reveal" aria-label="Projects">
      <div class="grid">
        <article class="tile" role="button" tabindex="0"
                 data-title="Xan0 V1 - V10"
                 data-description="An educational series exploring low-level system interaction and API hooking through Windows GDI. Conducted in a controlled environment for academic research."
                 data-youtube="zlohrqK1rHs"
                 data-tech="C#, WinAPI, pywin32, GDI">
          <span class="tile-title">Xan0 V1 - V10</span>
        </article>
        <article class="tile" role="button" tabindex="0"
                 data-title="XCrypt"
                 data-description="AES-256 encryption proof-of-concept focused on cryptographic rigor and behavior."
                 data-youtube="w2u2ONjnmzg"
                 data-tech="Python, Cryptography, File I/O">
          <span class="tile-title">XCrypt</span>
        </article>
        <article class="tile" role="button" tabindex="0"
                 data-title="GhostByte"
                 data-description="Asynchronous pressure testing of Discord API envelopes to study rate limits and automation behavior."
                 data-youtube="jDVMjEndHm4"
                 data-tech="Python, Discord.py, asyncio, WebSockets">
          <span class="tile-title">GhostByte</span>
        </article>
        <article class="tile" role="button" tabindex="0"
                 data-title="Streamz"
                 data-description="Portable video streaming platform with Flask and SQLite."
                 data-tech="Bootstrap, Flask, Sessions, SQLite, JavaScript"
                 data-fallback="Private showcase. Video withheld.">
          <span class="tile-title">Streamz</span>
        </article>
        <article class="tile" role="button" tabindex="0"
                 data-title="XanaX"
                 data-description="Discord-controlled RAT for research into command surfaces and defensive behaviors."
                 data-tech="Python"
                 data-fallback="Research tooling kept offline.">
          <span class="tile-title">XanaX</span>
        </article>
      </div>
    </section>
  </main>

  <div id="projectModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-content">
      <button class="close-button" aria-label="Close">x</button>
      <h3 id="modalTitle"></h3>
      <div class="modal-body">
        <div class="video-container">
          <iframe id="modalYoutube" title="Project Video" src="" frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen></iframe>
        </div>
        <div class="modal-details">
          <p id="modalDescription"></p>
          <ul id="modalTech" class="tags"></ul>
          <p id="modalFallback" style="display:none">
            <span id="modalFallbackText">Video unavailable.</span>
            <a id="modalYoutubeLink" target="_blank" rel="noopener noreferrer">Open on YouTube</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
